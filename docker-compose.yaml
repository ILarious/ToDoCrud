services:
  postgres:
    image: postgres:16-alpine
    container_name: todo-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: todo
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d todo"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env.web
    command: ["/app/todo-api"]
    ports:
      - "8080:8080"

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: todo-worker
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      web:
        condition: service_started
    env_file:
      - .env.worker
    command: ["/app/todo-worker"]

  frontend:
    image: nginx:1.27-alpine
    container_name: todo-frontend
    restart: unless-stopped
    depends_on:
      - web
    volumes:
      - ./frontend-simple:/usr/share/nginx/html:ro
    ports:
      - "5173:80"

volumes:
  postgres_data:
